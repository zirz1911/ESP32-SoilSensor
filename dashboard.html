<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soil Monitor Dashboard</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --blue:     #58a6ff;
      --orange:   #f0883e;
      --purple:   #bc8cff;
      --green:    #3fb950;
      --lime:     #a8f040;
      --yellow:   #f0d44e;
      --red:      #f85149;
      --radius:   12px;
      --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 0 0 32px;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1::before {
      content: "🌱";
      font-size: 1.5rem;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      transition: var(--transition);
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: var(--transition);
    }

    .conn-badge.connected   { border-color: var(--green); color: var(--green); }
    .conn-badge.connected .conn-dot   { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .conn-badge.connecting  { border-color: var(--yellow); color: var(--yellow); }
    .conn-badge.connecting .conn-dot  { background: var(--yellow); animation: blink 0.8s infinite; }
    .conn-badge.disconnected { border-color: var(--red); color: var(--red); }
    .conn-badge.disconnected .conn-dot { background: var(--red); }

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    /* ── IP Input ─────────────────────────────────────── */
    .ip-bar {
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(22,27,34,0.6);
    }

    .ip-bar label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }

    .ip-bar input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: monospace;
      width: 180px;
      outline: none;
      transition: border-color 0.2s;
    }

    .ip-bar input:focus { border-color: var(--blue); }

    .ip-bar button {
      background: var(--blue);
      color: #000;
      border: none;
      padding: 7px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .ip-bar button:hover { opacity: 0.85; }

    /* ── Grid ─────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }

    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .card-icon {
      font-size: 1.3rem;
      opacity: 0.8;
    }

    .card-value {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.04em;
      line-height: 1;
      transition: color var(--transition);
    }

    .card-value.updated {
      animation: flash 0.5s ease;
    }

    @keyframes flash {
      0%   { opacity: 1; }
      30%  { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .card-unit {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: 4px;
    }

    /* ── Progress Bar ─────────────────────────────────── */
    .progress-wrap {
      margin-top: 16px;
    }

    .progress-track {
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 6px;
      background: var(--accent);
      transition: width var(--transition);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── pH Scale ─────────────────────────────────────── */
    .ph-scale {
      margin-top: 16px;
      position: relative;
    }

    .ph-track {
      height: 10px;
      border-radius: 6px;
      background: linear-gradient(to right,
        #f85149 0%,
        #f0883e 20%,
        #f0d44e 35%,
        #3fb950 50%,
        #58a6ff 65%,
        #bc8cff 80%,
        #9b4dca 100%
      );
      position: relative;
    }

    .ph-marker {
      position: absolute;
      top: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      border: 2px solid var(--bg);
      box-shadow: 0 0 8px rgba(255,255,255,0.6);
      transform: translateX(-50%);
      transition: left var(--transition);
    }

    .ph-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Gauge (Temperature) ──────────────────────────── */
    .gauge-wrap {
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }

    .gauge-svg { overflow: visible; }

    /* ── Status Bar ───────────────────────────────────── */
    footer {
      max-width: 1400px;
      margin: 8px auto 0;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer span { display: flex; align-items: center; gap: 6px; }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 16px; }
      .ip-bar { padding: 12px 16px; flex-wrap: wrap; }
      .grid   { padding: 16px; gap: 12px; }
      footer  { padding: 0 16px; flex-direction: column; gap: 6px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>Soil Monitor Dashboard</h1>
  <div class="conn-badge disconnected" id="connBadge">
    <div class="conn-dot"></div>
    <span id="connText">Disconnected</span>
  </div>
</header>

<div class="ip-bar">
  <label>ESP32 IP:</label>
  <input type="text" id="espIp" value="192.168.1.100" placeholder="e.g. 192.168.1.100" />
  <button onclick="connect()">Connect</button>
</div>

<div class="grid">

  <!-- Moisture -->
  <div class="card" style="--accent: var(--blue)">
    <div class="card-header">
      <span class="card-label">Moisture</span>
      <span class="card-icon">💧</span>
    </div>
    <div class="card-value" id="val-moisture">—<span class="card-unit">%</span></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar-moisture" style="width:0%"></div>
      </div>
      <div class="progress-labels"><span>Dry 0%</span><span>100% Wet</span></div>
    </div>
  </div>

  <!-- Temperature -->
  <div class="card" style="--accent: var(--orange)">
    <div class="card-header">
      <span class="card-label">Temperature</span>
      <span class="card-icon">🌡️</span>
    </div>
    <div class="card-value" id="val-temperature">—<span class="card-unit">°C</span></div>
    <div class="gauge-wrap">
      <svg class="gauge-svg" width="160" height="90" viewBox="0 0 160 90">
        <!-- Track arc -->
        <path d="M 15 85 A 65 65 0 0 1 145 85" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12" stroke-linecap="round"/>
        <!-- Value arc -->
        <path id="gauge-arc" d="M 15 85 A 65 65 0 0 1 145 85" fill="none" stroke="var(--orange)"
              stroke-width="12" stroke-linecap="round"
              stroke-dasharray="204" stroke-dashoffset="204"
              style="transition: stroke-dashoffset var(--transition)"/>
        <!-- Labels -->
        <text x="10"  y="88" fill="#8b949e" font-size="10" font-family="sans-serif">0°</text>
        <text x="130" y="88" fill="#8b949e" font-size="10" font-family="sans-serif">50°</text>
      </svg>
    </div>
  </div>

  <!-- EC -->
  <div class="card" style="--accent: var(--purple)">
    <div class="card-header">
      <span class="card-label">Electrical Conductivity</span>
      <span class="card-icon">⚡</span>
    </div>
    <div class="card-value" id="val-ec">—<span class="card-unit">µS/cm</span></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar-ec" style="width:0%"></div>
      </div>
      <div class="progress-labels"><span>0</span><span>2000 µS/cm</span></div>
    </div>
  </div>

  <!-- pH -->
  <div class="card" style="--accent: var(--green)">
    <div class="card-header">
      <span class="card-label">pH Level</span>
      <span class="card-icon">🧪</span>
    </div>
    <div class="card-value" id="val-ph">—</div>
    <div class="ph-scale">
      <div class="ph-track">
        <div class="ph-marker" id="ph-marker" style="left:50%"></div>
      </div>
      <div class="ph-labels">
        <span>0</span><span>3.5</span><span>7</span><span>10.5</span><span>14</span>
      </div>
    </div>
  </div>

  <!-- Nitrogen -->
  <div class="card" style="--accent: var(--lime)">
    <div class="card-header">
      <span class="card-label">Nitrogen</span>
      <span class="card-icon">🌿</span>
    </div>
    <div class="card-value" id="val-nitrogen">—<span class="card-unit">mg/kg</span></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar-nitrogen" style="width:0%"></div>
      </div>
      <div class="progress-labels"><span>Low 0</span><span>200 High</span></div>
    </div>
  </div>

  <!-- Phosphorus -->
  <div class="card" style="--accent: var(--yellow)">
    <div class="card-header">
      <span class="card-label">Phosphorus</span>
      <span class="card-icon">🔬</span>
    </div>
    <div class="card-value" id="val-phosphorus">—<span class="card-unit">mg/kg</span></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar-phosphorus" style="width:0%"></div>
      </div>
      <div class="progress-labels"><span>Low 0</span><span>200 High</span></div>
    </div>
  </div>

  <!-- Potassium -->
  <div class="card" style="--accent: var(--red)">
    <div class="card-header">
      <span class="card-label">Potassium</span>
      <span class="card-icon">🔴</span>
    </div>
    <div class="card-value" id="val-potassium">—<span class="card-unit">mg/kg</span></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="bar-potassium" style="width:0%"></div>
      </div>
      <div class="progress-labels"><span>Low 0</span><span>200 High</span></div>
    </div>
  </div>

</div>

<footer>
  <span>🕐 Last updated: <span id="lastUpdate">—</span></span>
  <span id="wsStatus">WebSocket: Not connected</span>
</footer>

<script>
  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 2000;

  function getIP() {
    return document.getElementById('espIp').value.trim();
  }

  function setStatus(state) {
    const badge = document.getElementById('connBadge');
    const text  = document.getElementById('connText');
    const wsEl  = document.getElementById('wsStatus');
    badge.className = 'conn-badge ' + state;
    const labels = { connected: 'Connected', connecting: 'Connecting...', disconnected: 'Disconnected' };
    text.textContent = labels[state] || state;
    wsEl.textContent = 'WebSocket: ' + (labels[state] || state);
  }

  function connect() {
    if (ws) { ws.close(); }
    clearTimeout(reconnectTimer);
    setStatus('connecting');
    const ip = getIP();
    const url = `ws://${ip}:81`;

    try {
      ws = new WebSocket(url);
    } catch(e) {
      setStatus('disconnected');
      scheduleReconnect();
      return;
    }

    ws.onopen = () => {
      setStatus('connected');
      reconnectDelay = 2000;
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        updateDashboard(data);
      } catch(err) {
        console.warn('Invalid JSON:', e.data);
      }
    };

    ws.onclose = () => {
      setStatus('disconnected');
      scheduleReconnect();
    };

    ws.onerror = () => {
      setStatus('disconnected');
    };
  }

  function scheduleReconnect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => {
      console.log(`Reconnecting... (delay ${reconnectDelay}ms)`);
      connect();
      reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
    }, reconnectDelay);
  }

  function flashValue(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('updated');
    void el.offsetWidth; // reflow
    el.classList.add('updated');
  }

  function updateDashboard(d) {
    const now = new Date().toLocaleTimeString();
    document.getElementById('lastUpdate').textContent = now;

    // Moisture
    const m = +d.moisture.toFixed(1);
    document.getElementById('val-moisture').innerHTML = `${m}<span class="card-unit">%</span>`;
    document.getElementById('bar-moisture').style.width = `${Math.min(m, 100)}%`;
    flashValue('val-moisture');

    // Temperature (gauge arc: 204px = full 180°, range 0-50°C)
    const t = +d.temperature.toFixed(1);
    document.getElementById('val-temperature').innerHTML = `${t}<span class="card-unit">°C</span>`;
    const tPct = Math.min(Math.max(t / 50, 0), 1);
    document.getElementById('gauge-arc').style.strokeDashoffset = 204 - (tPct * 204);
    flashValue('val-temperature');

    // EC
    const ec = Math.round(d.ec);
    document.getElementById('val-ec').innerHTML = `${ec}<span class="card-unit">µS/cm</span>`;
    document.getElementById('bar-ec').style.width = `${Math.min((ec / 2000) * 100, 100)}%`;
    flashValue('val-ec');

    // pH
    const ph = +d.ph.toFixed(1);
    document.getElementById('val-ph').innerHTML = `${ph}`;
    document.getElementById('ph-marker').style.left = `${(ph / 14) * 100}%`;
    flashValue('val-ph');

    // N, P, K
    ['nitrogen','phosphorus','potassium'].forEach(key => {
      const v = Math.round(d[key]);
      document.getElementById(`val-${key}`).innerHTML = `${v}<span class="card-unit">mg/kg</span>`;
      document.getElementById(`bar-${key}`).style.width = `${Math.min((v / 200) * 100, 100)}%`;
      flashValue(`val-${key}`);
    });
  }

  // Demo mode when not connected — show sample data
  function runDemo() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    const demo = {
      moisture:    (Math.random() * 60 + 20).toFixed(1) * 1,
      temperature: (Math.random() * 15 + 22).toFixed(1) * 1,
      ec:          Math.round(Math.random() * 400 + 100),
      ph:          (Math.random() * 3 + 5.5).toFixed(1) * 1,
      nitrogen:    Math.round(Math.random() * 80 + 20),
      phosphorus:  Math.round(Math.random() * 60 + 10),
      potassium:   Math.round(Math.random() * 100 + 30),
    };
    updateDashboard(demo);
  }

  // Auto-connect on load + demo fallback
  window.addEventListener('load', () => {
    connect();
    // Run demo data every 3s as fallback when disconnected
    setInterval(runDemo, 3000);
  });
</script>
</body>
</html>
